<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaSential - Billing & Subscriptions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-600">SaaSential Billing</h1>

        <!-- Toggle Login/Register -->
        <div class="flex justify-center mb-6">
            <button id="showLoginFormBtn" class="px-4 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 hover:bg-gray-50" onclick="toggleForm('login')">Login</button>
            <button id="showRegisterFormBtn" class="px-4 py-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-indigo-600 hover:bg-gray-50" onclick="toggleForm('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="loginEmail" class="block text-sm font-medium text-gray-700">Email address</label>
                <input type="email" id="loginEmail" name="email" required class="mt-1 p-2 w-full border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="loginPassword" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="loginPassword" name="password" required class="mt-1 p-2 w-full border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 font-medium">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label for="registerName" class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="registerName" name="name" required class="mt-1 p-2 w-full border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="registerEmail" class="block text-sm font-medium text-gray-700">Email address</label>
                <input type="email" id="registerEmail" name="email" required class="mt-1 p-2 w-full border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="registerPassword" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="registerPassword" name="password" required class="mt-1 p-2 w-full border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 font-medium">Create Account</button>
        </form>

        <div id="messageBox" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                redirectBasedOnRole(token);
            }
        });

        function toggleForm(formType) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginBtn = document.getElementById('showLoginFormBtn');
            const registerBtn = document.getElementById('showRegisterFormBtn');
            const msgBox = document.getElementById('messageBox');
            
            msgBox.classList.add('hidden');

            if (formType === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginBtn.classList.add('text-indigo-600', 'border-indigo-600');
                loginBtn.classList.remove('text-gray-500', 'border-transparent');
                registerBtn.classList.remove('text-indigo-600', 'border-indigo-600');
                registerBtn.classList.add('text-gray-500', 'border-transparent');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerBtn.classList.add('text-indigo-600', 'border-indigo-600');
                registerBtn.classList.remove('text-gray-500', 'border-transparent');
                loginBtn.classList.remove('text-indigo-600', 'border-indigo-600');
                loginBtn.classList.add('text-gray-500', 'border-transparent');
            }
        }

        function showMessage(msg, isError = false) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = msg;
            msgBox.className = `mt-4 text-center text-sm font-medium ${isError ? 'text-red-600' : 'text-green-600'}`;
            msgBox.classList.remove('hidden');
        }

        function redirectBasedOnRole(token) {
            try {
                // Decode JWT 
                const payloadStr = atob(token.split('.')[1]);
                const payload = JSON.parse(payloadStr);
                
                // Spring security usually puts roles into an array, or in our token we have it differently?
                // Depending on structure, but usually simple check:
                if (payload.role === 'ROLE_ADMIN' || (payload.roles && payload.roles.includes('ROLE_ADMIN'))) {
                    window.location.href = '/admin-dashboard';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (e) {
                console.error("Invalid token", e);
                localStorage.removeItem('token');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.data.token);
                    showMessage("Login successful! Redirecting...");
                    setTimeout(() => redirectBasedOnRole(data.data.token), 1000);
                } else {
                    showMessage(data.message || "Login failed", true);
                }
            } catch (error) {
                showMessage("Connection error", true);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage("Registration successful! Please login.");
                    toggleForm('login');
                } else {
                    showMessage(data.message || "Registration failed", true);
                }
            } catch (error) {
                showMessage("Connection error", true);
            }
        });
    </script>
</body>
</html>
