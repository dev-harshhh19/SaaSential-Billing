<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - SaaSential</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-100 min-h-screen font-sans">

  <!-- Navbar -->
  <nav class="bg-gray-800 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center font-bold text-xl tracking-wider">
          SaaSential Admin
        </div>
        <div class="flex items-center space-x-4">
          <span class="text-gray-300 font-medium text-sm">Administrator</span>
          <button onclick="logout()"
            class="text-sm bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

    <!-- Metrics -->
    <h2 class="text-2xl font-bold text-gray-800">Business Overview</h2>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="metricsContainer">
      <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <h3 class="text-sm font-medium text-gray-500">Monthly Recurring Revenue (MRR)</h3>
        <p id="mrrExt" class="text-3xl font-bold text-gray-900 mt-2">$0.00</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <h3 class="text-sm font-medium text-gray-500">Total Users</h3>
        <p id="totalUsersExt" class="text-3xl font-bold text-gray-900 mt-2">0</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <h3 class="text-sm font-medium text-gray-500">Active Subscriptions</h3>
        <p id="activeSubsExt" class="text-3xl font-bold text-gray-900 mt-2">0</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <h3 class="text-sm font-medium text-gray-500">Failed Payments</h3>
        <p id="failedPayExt" class="text-3xl font-bold text-gray-900 mt-2">0</p>
      </div>
    </div>

    <!-- Create Plan Form -->
    <section class="bg-white shadow rounded-lg p-6 border border-gray-200">
      <h2 class="text-xl font-bold mb-4 text-gray-800">Create New Subscription Plan</h2>
      <form id="createPlanForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Plan Name</label>
          <input type="text" id="pName" required class="mt-1 p-2 w-full border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Price (USD)</label>
          <input type="number" step="0.01" id="pPrice" required class="mt-1 p-2 w-full border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Billing Cycle</label>
          <select id="pCycle" class="mt-1 p-2 w-full border rounded">
            <option value="MONTHLY">Monthly</option>
            <option value="YEARLY">Yearly</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">API Request Limit</label>
          <input type="number" id="pApiLimit" required class="mt-1 p-2 w-full border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Storage Limit (GB)</label>
          <input type="number" id="pStoreLimit" required class="mt-1 p-2 w-full border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Extra API Cost / unit</label>
          <input type="number" step="0.001" id="pApiCost" required class="mt-1 p-2 w-full border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Extra Storage Cost / GB</label>
          <input type="number" step="0.01" id="pStoreCost" required class="mt-1 p-2 w-full border rounded">
        </div>
        <div class="flex items-end">
          <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded shadow hover:bg-indigo-700">Save
            Plan</button>
        </div>
      </form>
    </section>

  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    document.addEventListener('DOMContentLoaded', () => {
      fetchMetrics();
    });

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/';
    }

    async function fetchMetrics() {
      try {
        const response = await fetch('/admin/dashboard', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 403 || response.status === 401) {
          alert('Unauthorized. Admin access only.');
          window.location.href = '/dashboard';
          return;
        }

        const result = await response.json();
        if (response.ok && result.data) {
          const d = result.data;
          document.getElementById('mrrExt').innerText = '$' + parseFloat(d.monthlyRecurringRevenue).toFixed(2);
          document.getElementById('totalUsersExt').innerText = d.totalUsers;
          document.getElementById('activeSubsExt').innerText = d.activeSubscriptions;
          document.getElementById('failedPayExt').innerText = d.failedPayments;
        }
      } catch (e) {
        console.error("Failed to load metrics", e);
      }
    }

    document.getElementById('createPlanForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('pName').value,
        price: parseFloat(document.getElementById('pPrice').value),
        billingCycle: document.getElementById('pCycle').value,
        apiLimit: parseInt(document.getElementById('pApiLimit').value),
        storageLimit: parseInt(document.getElementById('pStoreLimit').value),
        extraApiCost: parseFloat(document.getElementById('pApiCost').value),
        extraStorageCost: parseFloat(document.getElementById('pStoreCost').value),
        active: true,
        trialDays: 14 // default
      };

      try {
        const response = await fetch('/api/v1/plans', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert('Plan created successfully');
          e.target.reset();
        } else {
          const result = await response.json();
          alert('Failed to create plan: ' + result.message);
        }
      } catch (error) {
        console.error(error);
        alert("Creation error.");
      }
    });

  </script>
</body>

</html>
